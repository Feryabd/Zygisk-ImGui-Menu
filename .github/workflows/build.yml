name: Android CI (Zygisk ImGui Fixed System Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Memasang biner NDK r26b dan CMake yang sesuai dengan instruksi gradle
    - name: Install Android SDK Components
      run: |
        sdkmanager --install "ndk;26.1.10909125"
        sdkmanager --install "cmake;3.22.1"

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Zygisk Module Package
      run: ./gradlew :module:assembleRelease --no-daemon

    - name: Upload Output Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-ImGui-Stardust-PG3D
        path: out/*.zip
        
