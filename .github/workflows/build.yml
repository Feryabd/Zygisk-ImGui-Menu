name: Android CI (Zygisk ImGui Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Opsi ini memunculkan tombol "Run workflow" untuk build manual

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK & NDK
      uses: android-actions/setup-android@v3

    # Opsional: Memastikan Android NDK versi r25c/r26b terpasang (Zygisk membutuhkan NDK)
    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;25.2.9519653"

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # Menjalankan perintah Gradle Task bawaan template fedes1to untuk merilis modul
    - name: Build Zygisk Module Package
      run: ./gradlew :module:assembleRelease

    # Mengunggah hasil kompilasi modul .zip agar bisa Anda unduh langsung
    - name: Upload Output Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-ImGui-Mod-Menu-Zip
        path: out/*.zip
        
