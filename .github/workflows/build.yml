name: Android CI (Zygisk ImGui Fixed Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0 # Memastikan seluruh riwayat file biner statis ikut terunduh

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # PERBAIKAN UTAMA: Upgrade versi NDK ke r26b (26.1.10909125) untuk kestabilan C++20
    - name: Install Android NDK r26b
      run: |
        sdkmanager --install "ndk;26.1.10909125"

    # Mengatur variabel lingkungan lingkungan agar Gradle mendeteksi NDK r26b secara eksplisit
    - name: Set NDK Path Environment
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "ndk.dir=$ANDROID_HOME/ndk/26.1.10909125" >> local.properties

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Zygisk Module Package
      run: ./gradlew :module:assembleRelease --stacktrace

    - name: Upload Output Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-ImGui-Stardust-Zip
        path: out/*.zip
