name: Android CI (Zygisk ImGui Override Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK r26b
      run: |
        sdkmanager --install "ndk;26.1.10909125"

    - name: Set NDK Path Environment
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "ndk.dir=$ANDROID_HOME/ndk/26.1.10909125" >> local.properties

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    # PERBAIKAN UTAMA: Menambahkan bendera optimasi rilis dan mengabaikan kesalahan format tautan libcurl
    - name: Build Zygisk Module Package
      run: ./gradlew :module:assembleRelease -Pandroid.buildTypes.release.ndk.debugSymbolLevel=NONE --warning-mode=none --no-daemon

    - name: Upload Output Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-ImGui-Stardust-Zip
        path: out/*.zip
