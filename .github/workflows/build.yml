name: Android CI (Zygisk ImGui Fixed System Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

env:
  # Menghilangkan warning Node.js di log GitHub Actions Anda
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # PERBAIKAN: Pasang CMake 3.18.1 agar sinkron 100% dengan build.gradle
    - name: Install Android SDK Components (CMake & NDK)
      run: |
        sdkmanager --install "cmake;3.18.1"
        sdkmanager --install "ndk;26.1.10909125"

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Zygisk Module Package
      run: ./gradlew :module:assembleRelease --no-daemon

    - name: Upload Output Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-ImGui-Stardust-PG3D
        path: out/*.zip
        
